services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: polyglot
      POSTGRES_USER: polyglot
      POSTGRES_PASSWORD: polyglot
    ports:
      - "5432:5432"
    volumes:
      - polyglot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyglot -d polyglot"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    gpus: all
    environment:
      POLYGLOT_DATABASE_URL: postgresql://polyglot:polyglot@db:5432/polyglot
      POLYGLOT_AUTO_INIT_DB: "true"
      POLYGLOT_SEMANTIC_CACHE_ENABLED: "true"
      POLYGLOT_TRANSCRIPT_MEMORY_ENABLED: "true"
      POLYGLOT_CACHE_STRATEGY: context
      POLYGLOT_SIMILARITY_THRESHOLD: "0.98"
      POLYGLOT_TEXT_SIMILARITY_THRESHOLD: "0.92"
    ports:
      - "443:443"
    depends_on:
      db:
        condition: service_healthy

volumes:
  polyglot_pgdata:
